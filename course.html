    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="styles.css">
    
    <!-- Code Highlighting Theme (GitHub Dark Dimmed) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark-dimmed.min.css">
</head>
<body>
    <div class="blob blob-1" style="top: 0; left: auto; right: -200px; width: 400px; height: 400px"></div>
    
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; color: var(--text-primary); gap: 0.5rem">
                    <span class="logo-icon">🌿</span>
                    <span class="logo-text">VEIN<span class="highlight">Course</span></span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="course.html?page=syllabus">Syllabus</a></li>

            </ul>
        </div>

    <div class="course-layout">
        <aside class="sidebar">
            <nav id="sidebar-nav">
                <!-- Sidebar will be injected by JS -->
            </nav>
        </aside>

            <div id="content" class="markdown-body">
                <div style="display: flex; justify-content: center; padding: 4rem;">
                    <div class="loader" style="border: 4px solid rgba(63, 185, 80, 0.2); border-left-color: var(--accent-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
                    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
                </div>
            </div>
        </main>
    </div>

    <!-- Marked.js and Highlight.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/r.min.js"></script>
    <script src="script.js"></script>
